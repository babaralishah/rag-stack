name: CI Pipeline - Local RAG

on:
  push:
    branches: [ main, ci-cd ]
  pull_request:
    branches: [ main ]

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Production Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: local-rag:production
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build UI Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.ui
          push: false
          tags: local-rag:ui
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate Project Files
        run: |
          echo "🔍 Checking essential files..."
          [ -f "Dockerfile" ]     && echo "✅ Dockerfile found"          || exit 1
          [ -f "Dockerfile.ui" ]  && echo "✅ Dockerfile.ui found"       || exit 1
          [ -f "requirements.txt" ] && echo "✅ requirements.txt found" || exit 1
          [ -f "start.sh" ]       && echo "✅ start.sh found"            || exit 1
          [ -f "ui.py" ]          && echo "✅ ui.py found"               || exit 1
          echo "🎉 All required files are present!"

      - name: Final Summary
        run: |
          echo "============================================"
          echo "✅ CI Pipeline Completed Successfully!"
          echo "Project     : Local RAG App"
          echo "Branch      : ${{ github.ref_name }}"
          echo "Event       : ${{ github.event_name }}"
          echo "Duration    : ${{ job.status }}"
          echo "============================================"