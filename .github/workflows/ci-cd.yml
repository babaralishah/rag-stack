name: CI/CD Pipeline - Local RAG

on:
  push:
    branches: [ ci-cd ]

jobs:
  ci-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Production Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: local-rag:production
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build UI Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.ui
          push: false
          tags: local-rag:ui
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate Project Files
        run: |
          echo "🔍 Validating essential project files..."
          [ -f "Dockerfile" ]        && echo "✅ Dockerfile found" || exit 1
          [ -f "Dockerfile.ui" ]     && echo "✅ Dockerfile.ui found" || exit 1
          [ -f "requirements.txt" ]  && echo "✅ requirements.txt found" || exit 1
          [ -f "start.sh" ]          && echo "✅ start.sh found" || exit 1
          [ -f "ui.py" ]             && echo "✅ ui.py found" || exit 1
          echo "🎉 All required files are present!"

      - name: CI Summary
        run: |
          echo "============================================"
          echo "✅ CI Completed Successfully!"
          echo "Branch : ${{ github.ref_name }}"
          echo "============================================"

  deploy-to-huggingface:
    needs: ci-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Hugging Face Space
        run: |
          echo "🚀 Starting deployment to Hugging Face Space from ci-cd branch..."
          echo "Space ID: ${{ secrets.HF_SPACE_ID }}"
          echo "Note: This is a placeholder step."
          echo "In a real working setup, we would push the code to your HF Space here."
          echo "For now, the CI part is working perfectly."
        shell: bash