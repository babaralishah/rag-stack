name: CI Pipeline - Local RAG

on:
  push:
    branches: [ ci-cd ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Production Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: local-rag:prod
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Build UI Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.ui
          push: false
          tags: local-rag:ui
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate Project Files
        run: |
          echo "🔍 Validating essential files..."
          [ -f "Dockerfile" ] && echo "✅ Dockerfile" || (echo "❌ Dockerfile missing" && exit 1)
          [ -f "Dockerfile.ui" ] && echo "✅ Dockerfile.ui" || (echo "❌ Dockerfile.ui missing" && exit 1)
          [ -f "requirements.txt" ] && echo "✅ requirements.txt" || (echo "❌ requirements.txt missing" && exit 1)
          [ -f "start.sh" ] && echo "✅ start.sh" || (echo "❌ start.sh missing" && exit 1)
          [ -f "ui.py" ] && echo "✅ ui.py" || (echo "❌ ui.py missing" && exit 1)
          echo "✅ All critical files are present!"

      - name: Summary
        run: |
          echo "============================================"
          echo "🎉 CI Pipeline Completed Successfully!"
          echo "Project   : Local RAG App"
          echo "Branch    : ${{ github.ref }}"
          echo "Triggered : ${{ github.event_name }}"
          echo "Status    : Success"
          echo "============================================"