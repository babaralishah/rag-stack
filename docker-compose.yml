version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: local-rag-api
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      PYTHONUNBUFFERED: "1"
      WATCHFILES_FORCE_POLLING: "true"
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    working_dir: /app
    command: >
      uvicorn src.api:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/src
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped   # Good practice

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: local-rag-ui
    environment:
      API_BASE_URL: "http://api:8000"
      PYTHONUNBUFFERED: "1"
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    working_dir: /app
    command: >
      streamlit run ui.py
      --server.address 0.0.0.0
      --server.port 8501
    depends_on:
      - api
    restart: unless-stopped